<div class="page active">
  <div class="tb">
    <div class="pt">Gestion des Utilisateurs</div>
    <div class="ta">
      <button class="btn bp" (click)="ajouter()">+ Nouvel Utilisateur</button>
    </div>
  </div>

  <div class="kg" style="grid-template-columns: repeat(3, 1fr)">
    <div class="kpi">
      <div class="kl">Total Agents & Admins</div>
      <div class="kv">3</div>
      <div class="ks">comptes enregistrés</div>
    </div>
    <div class="kpi kok">
      <div class="kl">Utilisateurs Actifs</div>
      <div class="kv">2</div>
    </div>
    <div class="kpi">
      <div class="kl">Comptes Inactifs</div>
      <div class="kv">1</div>
    </div>
  </div>

  <div class="tw">
    <table>
      <thead>
        <tr>
          <th>Nom Prénom</th>
          <th>Adresse Email</th>
          <th>Rôle Fonctionnel</th>
          <th>Niveau d'accès</th>
          <th>Dernière connexion</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users">
          <td style="font-weight: 500;">{{ u.nom }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.role }}</td>
          <td>{{ u.acces }}</td>
          <td style="color: #64748b;">{{ u.date }}</td>
          <td><span class="b" [ngClass]="u.badge">{{ u.statut }}</span></td>
          <td>
            <span class="al" (click)="editer(u)">Éditer</span>
            <span class="al" style="color: #ef4444; margin-left: 10px;" (click)="suspendre(u)">Suspendre</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
